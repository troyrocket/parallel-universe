<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320">
  <rect width="720" height="320" fill="#131313"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#84967e">LAYER 1</text>
  <text x="360" y="50" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#00FF41">HUMAN OVERSIGHT</text>

  <!-- Real Person -->
  <rect x="280" y="70" width="160" height="40" fill="#1f1f1f" stroke="#00FF41" stroke-width="1"/>
  <text x="360" y="95" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#00FF41">Real Person</text>

  <!-- Arrow down -->
  <line x1="360" y1="110" x2="360" y2="140" stroke="#84967e" stroke-width="1"/>
  <polygon points="355,135 365,135 360,142" fill="#84967e"/>

  <!-- Dashboard -->
  <rect x="140" y="145" width="440" height="40" fill="#1b1b1b" stroke="#00FF41" stroke-width="1"/>
  <text x="360" y="170" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#00FF41">Web Dashboard</text>

  <!-- Arrows down to Digital Selves -->
  <line x1="220" y1="185" x2="220" y2="215" stroke="#84967e" stroke-width="1"/>
  <polygon points="215,210 225,210 220,217" fill="#84967e"/>
  <line x1="360" y1="185" x2="360" y2="215" stroke="#84967e" stroke-width="1"/>
  <polygon points="355,210 365,210 360,217" fill="#84967e"/>
  <line x1="500" y1="185" x2="500" y2="215" stroke="#84967e" stroke-width="1"/>
  <polygon points="495,210 505,210 500,217" fill="#84967e"/>

  <!-- Digital Self 1 -->
  <rect x="150" y="220" width="140" height="70" fill="#2a2a2a"/>
  <text x="220" y="245" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#e2e2e2">Digital Self A</text>
  <text x="220" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#84967e">Credit: 720</text>
  <text x="220" y="275" text-anchor="middle" font-family="monospace" font-size="9" fill="#84967e">Loans: 2 active</text>

  <!-- Digital Self 2 -->
  <rect x="290" y="220" width="140" height="70" fill="#2a2a2a"/>
  <text x="360" y="245" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#e2e2e2">Digital Self B</text>
  <text x="360" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#84967e">Credit: 680</text>
  <text x="360" y="275" text-anchor="middle" font-family="monospace" font-size="9" fill="#84967e">Loans: 0 active</text>

  <!-- Digital Self 3 -->
  <rect x="430" y="220" width="140" height="70" fill="#2a2a2a"/>
  <text x="500" y="245" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#e2e2e2">Digital Self C</text>
  <text x="500" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#84967e">Credit: 810</text>
  <text x="500" y="275" text-anchor="middle" font-family="monospace" font-size="9" fill="#84967e">Loans: 1 active</text>

  <!-- Labels under dashboard -->
  <text x="160" y="305" font-family="monospace" font-size="9" fill="#84967e">Create / Freeze / Monitor</text>
  <text x="380" y="305" font-family="monospace" font-size="9" fill="#84967e">Credit / Loans / Revenue / Guardrails</text>
</svg>
