<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500">
  <rect width="400" height="500" fill="#1b1b1b" rx="0"/>
  
  <!-- Avatar -->
  <rect x="100" y="30" width="200" height="200" stroke="#00FF41" stroke-width="2" fill="#2a2a2a"/>
  <image x="100" y="30" width="200" height="200" href="data:image/svg+xml;base64,"/>
  
  <!-- Name -->
  <text x="200" y="270" text-anchor="middle" font-family="monospace" font-size="20" font-weight="700" fill="#00FF41">Alice-Explorer</text>
  
  <!-- Fields -->
  <text x="50" y="310" font-family="monospace" font-size="11" fill="#84967e">ADDRESS</text>
  <text x="350" y="310" text-anchor="end" font-family="monospace" font-size="13" fill="#e2e2e2">0xA3c8...7F2d</text>
  
  <text x="50" y="340" font-family="monospace" font-size="11" fill="#84967e">STATUS</text>
  <text x="350" y="340" text-anchor="end" font-family="monospace" font-size="13" fill="#00FF41">ACTIVE</text>
  
  <text x="50" y="370" font-family="monospace" font-size="11" fill="#84967e">CREDIT</text>
  <text x="350" y="370" text-anchor="end" font-family="monospace" font-size="13" fill="#e2e2e2">680 / 900</text>
  
  <!-- Credit bar -->
  <rect x="50" y="390" width="300" height="4" fill="#353535"/>
  <rect x="50" y="390" width="226" height="4" fill="#00FF41"/>
  
  <!-- Chips -->
  <rect x="100" y="420" width="100" height="22" fill="#353535"/>
  <rect x="100" y="420" width="2" height="22" fill="#00FF41"/>
  <text x="110" y="435" font-family="monospace" font-size="9" fill="#00FF41">DIGITAL_SELF</text>
  
  <rect x="215" y="420" width="80" height="22" fill="#353535"/>
  <rect x="215" y="420" width="2" height="22" fill="#00FF41"/>
  <text x="225" y="435" font-family="monospace" font-size="9" fill="#00FF41">ERC-8004</text>
  
  <!-- Footer -->
  <text x="200" y="475" text-anchor="middle" font-family="monospace" font-size="11" fill="#84967e">&gt;_ PARALLEL_UNIVERSE</text>
</svg>